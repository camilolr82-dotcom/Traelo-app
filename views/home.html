<div class="view active" id="view-home">
  <div class="home-search-hero">
    <h1 class="home-hero-title">¿Qué quieres traer de USA?</h1>
    <p class="home-hero-sub">Busca cualquier producto y te mostramos cuánto cuesta puesto en Colombia</p>
    <div class="home-search-box">
      <input type="text" id="home-search-input" class="home-search-input" placeholder="Ej: audífonos Sony, iPhone, whey protein..." autocomplete="off"/>
      <button class="home-camera-btn" id="home-camera-btn" onclick="Home.abrirCamara()" title="Buscar por foto"><i data-lucide="camera"></i></button>
      <button class="home-search-btn" id="home-search-btn" onclick="Home.buscarDesdeInput()" title="Buscar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>
  <div class="home-chips" id="home-chips">
    <button class="home-chip" onclick="Home.buscarCategoria('electronica', event.currentTarget)">ELECTRÓNICA</button>
    <button class="home-chip" onclick="Home.buscarCategoria('ropa', event.currentTarget)">ROPA Y ZAPATOS</button>
    <button class="home-chip" onclick="Home.buscarCategoria('suplementos', event.currentTarget)">SUPLEMENTOS</button>
    <button class="home-chip" onclick="Home.buscarCategoria('gaming', event.currentTarget)">GAMING</button>
    <button class="home-chip" onclick="Home.buscarCategoria('belleza', event.currentTarget)">BELLEZA</button>
    <button class="home-chip" onclick="Home.buscarCategoria('hogar', event.currentTarget)">HOGAR</button>
    <button class="home-chip" onclick="Home.buscarCategoria('libros', event.currentTarget)">LIBROS</button>
  </div>
  <div class="home-results" id="home-results">
    <div class="home-empty">
      <div class="home-empty-icon">🔍</div>
      <div class="home-empty-text">Busca un producto para ver los 4 mejores resultados de Amazon<br>con precio total puesto en Colombia</div>
    </div>
  </div>
</div>
